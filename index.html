<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Complejo Tambor - Control de Canchas</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1a0d; font-family:'DM Sans',sans-serif; color:#e8f0e8; min-height:100vh; }
  .app { max-width:480px; margin:0 auto; padding:12px 12px 110px; }

  /* Header */
  .header { display:flex; align-items:center; justify-content:center; gap:10px; padding:8px 0 16px; }
  .header img { width:52px; height:52px; object-fit:contain; border-radius:12px; }
  .header h1 { font-size:20px; font-weight:900; color:#27a84a; letter-spacing:-0.8px; line-height:1.1; }
  .header h1 span { color:#e87b1c; }
  .header .sub { font-size:10px; color:#5a7a5a; font-weight:600; letter-spacing:2px; text-transform:uppercase; }

  /* Bottom nav */
  .bottom-nav { position:fixed; bottom:0; left:0; right:0; padding:10px 12px 14px; background:linear-gradient(transparent,#0d1a0d 30%); z-index:50; }
  .tab-bar { display:flex; gap:2px; background:#0d1a0d; padding:6px; border-radius:14px; max-width:420px; margin:0 auto; }
  .tab-btn { flex:1; padding:9px 2px; border:none; border-radius:11px; font-family:inherit; font-size:11.5px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; transition:all .2s; }
  .tab-btn.active { background:linear-gradient(135deg,#1d8a3e,#27a84a); color:#fff; font-weight:800; box-shadow:0 2px 12px #1d8a3e55; }
  .tab-btn:not(.active) { background:transparent; color:#5a7a5a; font-weight:500; }
  .badge { background:#ef4444; color:#fff; font-size:9px; font-weight:800; border-radius:99px; min-width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; padding:0 4px; }

  /* Date nav */
  .date-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding:0 4px; }
  .nav-btn { background:#1a2b1a; border:1px solid #2d4a2d; border-radius:10px; color:#e87b1c; font-size:22px; font-weight:700; cursor:pointer; width:42px; height:42px; display:flex; align-items:center; justify-content:center; font-family:inherit; }
  .date-title { font-size:17px; font-weight:800; color:#e8f0e8; letter-spacing:-0.5px; text-align:center; }
  .today-btn { background:none; border:none; color:#e87b1c; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
  .date-pick { text-align:center; margin-bottom:14px; }
  .date-pick input { background:#1a2b1a; color:#a3d9a5; border:1px solid #2d4a2d; border-radius:10px; padding:5px 12px; font-size:13px; font-family:inherit; cursor:pointer; }

  /* Inputs */
  .inp { background:#152015; border:1.5px solid #2d4a2d; border-radius:10px; color:#e8f0e8; padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; outline:none; width:100%; }
  .inp:focus { border-color:#1d8a3e; }
  .lbl { display:flex; flex-direction:column; gap:6px; color:#7fa87a; font-size:12px; font-weight:600; }

  /* Calendar grid */
  .cal-grid-head { display:grid; grid-template-columns:58px 1fr 1fr 1fr; gap:3px; margin-bottom:3px; }
  .cal-grid-row { display:grid; grid-template-columns:58px 1fr 1fr 1fr; gap:3px; }
  .cal-head-cell { font-size:10px; font-weight:800; text-align:center; padding:6px 2px; border-radius:8px; }
  .cal-hour { font-size:12px; font-weight:700; color:#7fa87a; text-align:center; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; }
  .cal-cell { border-radius:8px; padding:6px 4px; text-align:center; transition:all .15s; min-height:38px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; }
  .cal-cell.avail { background:#152015; border:1.5px solid #1e301e; }
  .cal-cell.booked { border:2px solid; }
  .cal-cell.blocked { background:#4a352033; border:1.5px dashed #6b4a2a55; cursor:default; }
  .cal-cell .client-name { font-size:10px; font-weight:800; color:#e8f0e8; line-height:1.2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:100%; }
  .cal-cell .amount-sm { font-size:9px; font-weight:700; }

  /* Detail expand */
  .expand-detail { margin:4px 0 4px 61px; padding:10px 12px; background:#1a2b1a; border-radius:10px; font-size:12px; color:#c0d8c0; }

  /* Legend */
  .legend { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding:0 2px; }
  .legend-item { display:flex; align-items:center; gap:4px; font-size:11px; color:#7fa87a; }
  .legend-dot { width:12px; height:12px; border-radius:3px; display:inline-block; }

  /* Cards */
  .card { background:#152015; border-radius:14px; padding:14px 16px; }
  .card-summary { margin-top:16px; padding:14px 18px; border-radius:14px; background:linear-gradient(135deg,#1d8a3e22,#0d1a0d); border:1px solid #1d8a3e33; display:flex; justify-content:space-between; align-items:center; }
  .mono { font-family:'JetBrains Mono',monospace; }
  .orange { color:#e87b1c; }
  .green { color:#27a84a; }
  .red { color:#ef4444; }

  /* Court badge */
  .court-badge { font-weight:700; font-size:11px; padding:2px 8px; border-radius:8px; white-space:nowrap; }
  .status-badge { font-weight:700; font-size:10px; padding:2px 8px; border-radius:6px; }

  /* Small buttons */
  .sm-btn { border:none; border-radius:8px; padding:6px 10px; font-size:11px; font-weight:700; cursor:pointer; font-family:inherit; }

  /* Court select buttons */
  .court-btn { flex:1; padding:12px 6px; border-radius:12px; border:2px solid #2d4a2d; background:#152015; color:#5a7a5a; font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:4px; transition:all .2s; }
  .court-btn.sel { }

  /* Payment buttons */
  .pay-btn { flex:1; padding:10px 6px; border-radius:10px; border:2px solid #2d4a2d; background:#152015; color:#5a7a5a; font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; transition:all .2s; }

  /* Big total */
  .big-total { padding:20px; border-radius:16px; background:linear-gradient(145deg,#1d8a3e15,#0d1a0d); border:1px solid #1d8a3e22; text-align:center; }

  /* Modal */
  .modal-overlay { position:fixed; inset:0; z-index:999; display:flex; align-items:center; justify-content:center; background:#000000cc; padding:20px; }
  .modal-box { background:#152015; border-radius:18px; padding:28px 24px; max-width:340px; width:100%; border:1px solid #2d4a2d; }

  /* Range buttons */
  .range-btn { padding:8px 14px; border-radius:10px; border:2px solid #2d4a2d; background:#152015; color:#5a7a5a; font-weight:700; font-size:12px; cursor:pointer; font-family:inherit; }
  .range-btn.sel { border-color:#e87b1c; background:#e87b1c22; color:#e87b1c; }

  /* Bar chart */
  .bar-bg { flex:1; height:22px; background:#1a2b1a; border-radius:6px; overflow:hidden; }
  .bar-fill { height:100%; border-radius:6px; background:linear-gradient(90deg,#1d8a3e,#27a84a); display:flex; align-items:center; justify-content:flex-end; padding-right:8px; }

  /* Settings gear */
  .gear-btn { background:none; border:none; font-size:20px; cursor:pointer; padding:4px; opacity:0.5; transition:opacity .2s; }
  .gear-btn:hover { opacity:1; }

  .hidden { display:none; }
</style>
</head>

function getToday(){ const d=new Date(); return d.toISOString().split("T")[0]; }
function fmtDate(s){ const[y,m,d]=s.split("-"); const dt=new Date(y,m-1,d); const ds=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"]; const ms=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"]; return `${ds[dt.getDay()]} ${parseInt(d)} ${ms[dt.getMonth()]} ${y}`; }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function isPast(d){ return d < getToday(); }

const BIN_ID = "69c70e22aa77b81da928ffe1";
const BIN_KEY = "$2a$10$MTzGkFsu45b07iGi4Zm0u.5tJDkbU6LGtMAasLZ7pttj5O34xPQvS";
const BIN_URL = "https://api.jsonbin.io/v3/b/" + BIN_ID;
let syncing = false;
let syncStatus = "";

async function cloudLoad(){
  try {
    const r = await fetch(BIN_URL + "/latest", { headers:{"X-Master-Key":BIN_KEY} });
    const j = await r.json();
    if(j.record){
      bookings = j.record.bookings || [];
      adminPass = j.record.pass || "1234";
      localStorage.setItem("canchas-bookings", JSON.stringify(bookings));
      localStorage.setItem("canchas-pass", adminPass);
      syncStatus = "✓";
    }
  } catch(e){ console.error("Cloud load error:",e); syncStatus = "⚠"; }
}

async function cloudSave(){
  if(syncing) return;
  syncing = true; syncStatus = "⏳";
  try {
    await fetch(BIN_URL, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":BIN_KEY},
      body: JSON.stringify({ bookings, pass: adminPass })
    });
    syncStatus = "✓";
  } catch(e){ console.error("Cloud save error:",e); syncStatus = "⚠"; }
  syncing = false;
}

async function loadData(){
  // Carga rápida desde caché local
  try{ const r=localStorage.getItem("canchas-bookings"); bookings=r?JSON.parse(r):[]; }catch{ bookings=[]; }
  try{ const r=localStorage.getItem("canchas-pass"); if(r) adminPass=r; }catch{}
  render();
  // Luego sincroniza desde la nube
  await cloudLoad();
  render();
}

function saveBookings(){
  try{localStorage.setItem("canchas-bookings",JSON.stringify(bookings));}catch(e){console.error(e);}
  cloudSave().then(()=>render());
}
function savePass(){
  try{localStorage.setItem("canchas-pass",adminPass);}catch(e){console.error(e);}
  cloudSave().then(()=>render());
}

function guardPast(date, fn){
  if(isPast(date) && !pastUnlocked){
    pendingAction = fn;
    render();
    return false;
  }
  return true;
}

function unlockPast(){
  pastUnlocked = true;
  if(pendingAction){ const fn=pendingAction; pendingAction=null; fn(); }
  else render();
}

/* ═══════════════════════════════════════════════
   ACTIONS
   ═══════════════════════════════════════════════ */
function addBooking(bk){
  bookings.push(bk); saveBookings(); editBk=null; prefill=null; tab="calendario"; render();
}
function updateBooking(bk){
  bookings=bookings.map(b=>b.id===bk.id?bk:b); saveBookings(); editBk=null; prefill=null; tab="calendario"; render();
}
function deleteBooking(id){
  const bk=bookings.find(b=>b.id===id);
  if(bk && !guardPast(bk.date, ()=>deleteBooking(id))) return;
  bookings=bookings.filter(b=>b.id!==id); saveBookings(); render();
}
function togglePaid(id){
  const bk=bookings.find(b=>b.id===id);
  if(bk && !guardPast(bk.date, ()=>togglePaid(id))) return;
  bookings=bookings.map(b=>b.id===id?{...b,paid:!b.paid}:b); saveBookings(); render();
}
function startEdit(bk){
  if(!guardPast(bk.date, ()=>startEdit(bk))) return;
  editBk={...bk}; tab="nueva"; render();
}
function bookSlot(hour,court){
  if(!guardPast(selDate, ()=>bookSlot(hour,court))) return;
  prefill={hour,court}; tab="nueva"; render();
}

/* ═══════════════════════════════════════════════
   SLOT HELPERS
   ═══════════════════════════════════════════════ */
function getSlot(hour,courtId,date){
  const db=bookings.filter(b=>b.date===(date||selDate));
  const bk=db.find(b=>b.hour===hour&&b.court===courtId);
  if(bk) return {s:"booked",b:bk};
  if(courtId==="fut6a"||courtId==="fut6b"){ const f8=db.find(b=>b.hour===hour&&b.court==="fut8"); if(f8) return {s:"blocked",b:f8}; }
  if(courtId==="fut8"){ const a6=db.find(b=>b.hour===hour&&(b.court==="fut6a"||b.court==="fut6b")); if(a6) return {s:"blocked",b:a6}; }
  return {s:"available",b:null};
}
function hasConflict(date,hour,court,excludeId){
  const ex=bookings.filter(b=>b.date===date&&b.hour===hour&&b.id!==excludeId);
  if(court==="fut8") return ex.some(b=>["fut6a","fut6b","fut8"].includes(b.court));
  return ex.some(b=>b.court===court||b.court==="fut8");
}

function checkPw(){
  const el=document.getElementById("pw-input");
  if(el.value===adminPass){ unlockPast(); }
  else { document.getElementById("pw-error").classList.remove("hidden"); el.value=""; el.focus(); }
}

function changePass(){
  const cur=document.getElementById("set-cur").value;
  const nw=document.getElementById("set-new").value;
  const msg=document.getElementById("set-msg");
  if(cur!==adminPass){ msg.textContent="Contraseña actual incorrecta"; msg.style.color="#ef4444"; msg.classList.remove("hidden"); return; }
  if(nw.length<1){ msg.textContent="Ingresá una nueva contraseña"; msg.style.color="#ef4444"; msg.classList.remove("hidden"); return; }
  adminPass=nw; savePass(); pastUnlocked=false;
  msg.textContent="✓ Contraseña actualizada"; msg.style.color="#27a84a"; msg.classList.remove("hidden");
}

function renderCalendar(){
  let avail=0, total=HOURS.length*3;

  let html = dateNavHtml();

  html += `<div class="legend">

    </div>
    <div style="font-size:11px;color:#e87b1c;font-weight:700">${avail} libres</div>
  </div>`;
  // Grid header
  html += `<div class="cal-grid-head">
    <div style="font-size:10px;color:#5a7a5a;font-weight:700;text-align:center;padding:4px">HORA</div>`;
  COURTS.forEach(c=>{ html += `<div class="cal-head-cell" style="color:${c.color};background:${c.color}15">${c.icon} ${c.name}</div>`; });

  // Grid rows
  HOURS.forEach(h=>{
    html += `<div class="cal-grid-row" style="margin-bottom:3px">`;
    html += `<div class="cal-hour">${h.l}</div>`;
    COURTS.forEach(c=>{
      const info=getSlot(h.v,c.id);
      const key=`${h.v}-${c.id}`;
      if(info.s==="available"){
        html += `<div class="cal-cell avail" onclick="bookSlot(${h.v},'${c.id}')"><span style="font-size:13px;opacity:0.3">+</span></div>`;
      } else if(info.s==="booked"){
        const b=info.b;
        html += `<div class="cal-cell booked" style="background:${c.color}30;border-color:${c.color}88" onclick="expanded=expanded==='${key}'?null:'${key}';render()">
          <span class="client-name">${b.client||"—"}</span>
          <span class="amount-sm" style="color:${b.paid?"#27a84a":"#ef4444"}">${b.paid?"✓":"⏳"} ₡${Number(b.amount).toLocaleString()}</span>

      } else {
        html += `<div class="cal-cell blocked"><span style="font-size:10px;color:#6b4a2a">🔒</span></div>`;
      }
    });
    html += `</div>`;
    // Expanded details
    COURTS.forEach(c=>{
      const info=getSlot(h.v,c.id);
      if(expanded===`${h.v}-${c.id}` && info.s==="booked"){
        const b=info.b;
        html += `<div class="expand-detail" style="border-left:3px solid ${c.color}">
          <div style="font-weight:800;color:#e8f0e8;margin-bottom:4px">${b.client||"Sin nombre"}</div>

          ${b.notes?`<div style="font-size:11px;color:#7fa87a;margin-top:4px">${b.notes}</div>`:""}

function renderForm(){
  const f = editBk || {date:selDate, court:prefill?.court||"fut6a", hour:prefill?.hour||18, client:"", amount:"", method:"Efectivo", paid:true, notes:""};
  const conflict = hasConflict(f.date, f.hour, f.court, editBk?.id);

  html += `<label class="lbl" style="margin-bottom:14px"><span>Fecha</span><input type="date" class="inp" value="${f.date}" onchange="formSet('date',this.value)"></label>`;

  // Court
  html += `<div style="margin-bottom:14px"><span style="color:#7fa87a;font-size:12px;font-weight:600;display:block;margin-bottom:8px">Cancha</span><div style="display:flex;gap:6px">`;
  COURTS.forEach(c=>{
    const sel=f.court===c.id;
    html += `<button class="court-btn" style="${sel?`border-color:${c.color};background:${c.color}22;color:${c.color}`:""}" onclick="formSet('court','${c.id}')"><span style="font-size:20px">${c.icon}</span>${c.name}</button>`;
  });
  html += `</div>`;
  if(f.court==="fut8") html += `<div style="margin-top:8px;padding:8px 12px;border-radius:8px;background:#d4a01218;color:#d4a012;font-size:11px;font-weight:600">🏟️ Fut8 usa ambas canchas de Fut6</div>`;
  html += `</div>`;

  // Hour
  html += `<label class="lbl" style="margin-bottom:14px"><span>Hora</span><select class="inp" onchange="formSet('hour',Number(this.value))">`;
  HOURS.forEach(h=>{ html += `<option value="${h.v}" ${f.hour===h.v?"selected":""}>${h.l}</option>`; });
  html += `</select></label>`;

  if(conflict) html += `<div style="padding:10px 14px;border-radius:10px;background:#ef444422;color:#ef4444;font-size:13px;font-weight:700;border:1px solid #ef444444;margin-bottom:14px">⚠️ Conflicto: ya hay reserva en este horario</div>`;

  html += `<label class="lbl" style="margin-bottom:14px"><span>Cliente</span><input type="text" class="inp" value="${f.client||""}" oninput="formSet('client',this.value)" placeholder="Nombre del cliente"></label>`;
  html += `<label class="lbl" style="margin-bottom:14px"><span>Monto (₡)</span><input type="number" class="inp mono" style="font-size:22px;font-weight:900" value="${f.amount||""}" oninput="formSet('amount',this.value)" placeholder="0"></label>`;

  // Method
  html += `<div style="margin-bottom:14px"><span style="color:#7fa87a;font-size:12px;font-weight:600;display:block;margin-bottom:8px">Método de pago</span><div style="display:flex;gap:6px">`;
  METHODS.forEach(m=>{
    const sel=f.method===m;
    html += `<button class="pay-btn" style="${sel?`border-color:#e87b1c;background:#e87b1c22;color:#e87b1c`:""}" onclick="formSet('method','${m}')">${MICONS[m]} ${m}</button>`;
  });
  html += `</div></div>`;

  // Paid
  html += `<div style="display:flex;gap:8px;margin-bottom:14px">`;
  [true,false].forEach(v=>{
    const sel=f.paid===v;
    const col=v?"#1d8a3e":"#ef4444";
    html += `<button class="pay-btn" style="flex:1;padding:12px;font-size:13px;${sel?`border-color:${col};background:${col}22;color:${v?"#27a84a":"#ef4444"}`:""}" onclick="formSet('paid',${v})">${v?"✓ Pagado":"⏳ Pendiente"}</button>`;
  });
  html += `</div>`;

  html += `<label class="lbl" style="margin-bottom:14px"><span>Notas (opcional)</span><input type="text" class="inp" value="${f.notes||""}" oninput="formSet('notes',this.value)" placeholder="Observaciones..."></label>`;

  // Buttons
  const dis = !f.amount || conflict;
  html += `<div style="display:flex;gap:8px">`;
  if(editBk) html += `<button style="flex:1;padding:16px;border-radius:14px;background:#2d4a2d;color:#a3d9a5;font-weight:700;font-size:15px;border:none;cursor:pointer;font-family:inherit" onclick="editBk=null;prefill=null;tab='calendario';render()">Cancelar</button>`;
  html += `<button ${dis?"disabled":""} style="flex:2;padding:16px;border-radius:14px;background:${dis?"#1a2b1a":"linear-gradient(135deg,#1d8a3e,#27a84a)"};color:${dis?"#5a7a5a":"#fff"};font-weight:900;font-size:16px;border:none;cursor:${dis?"default":"pointer"};font-family:inherit;letter-spacing:-0.3px;box-shadow:${dis?"none":"0 4px 20px #1d8a3e44"}" onclick="submitForm()">${editBk?"Guardar Cambios":"Registrar Reserva"}</button>`;
  html += `</div>`;
  return html;
}

// Form state (stored in a hidden data attr or just re-read from DOM)
let formData = null;
function formSet(k,v){
  if(!formData) formData = editBk ? {...editBk} : {date:selDate,court:prefill?.court||"fut6a",hour:prefill?.hour||18,client:"",amount:"",method:"Efectivo",paid:true,notes:""};
  formData[k]=v;
  // Re-render form keeping formData
  const saved=formData;
  editBk = editBk ? saved : null;
  if(!editBk){ prefill=null; editBk=null; }
  // Quick: just re-render
  const bkp_edit=editBk;
  editBk=saved;
  render();
  editBk=bkp_edit||null;
  formData=saved;
}

function submitForm(){
  if(!formData) return;
  const f=formData;
  if(!f.amount) return;
  // Guard past
  if(!guardPast(f.date, ()=>submitForm())) return;
  if(hasConflict(f.date,f.hour,f.court,editBk?.id)) return;
  const bk={...f, amount:Number(f.amount), id:editBk?.id||genId()};
  if(editBk?.id) updateBooking(bk); else addBooking(bk);
  formData=null;
}

/* ═══════════════════════════════════════════════
   SUMMARY VIEW
   ═══════════════════════════════════════════════ */
function renderSummary(){
  const d=new Date(selDate+"T12:00:00");
  let s0=selDate,s1=selDate;
  if(summaryRange==="week"){ const st=new Date(d);st.setDate(d.getDate()-d.getDay()+1);const en=new Date(st);en.setDate(st.getDate()+6);s0=st.toISOString().split("T")[0];s1=en.toISOString().split("T")[0]; }
  if(summaryRange==="month"){ s0=selDate.slice(0,7)+"-01";const en=new Date(d.getFullYear(),d.getMonth()+1,0);s1=en.toISOString().split("T")[0]; }

  const fl=bookings.filter(b=>b.date>=s0&&b.date<=s1);
  const tot=fl.reduce((a,b)=>a+Number(b.amount||0),0);
  const paid=fl.filter(b=>b.paid).reduce((a,b)=>a+Number(b.amount||0),0);
  const pend=tot-paid;

  let html = `<div style="font-size:18px;font-weight:800;margin-bottom:14px">📊 Resumen</div>`;
  html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
    <input type="date" class="inp" style="flex:1;min-width:140px" value="${selDate}" onchange="selDate=this.value;render()">`;
  ["day","week","month"].forEach(r=>{
    html += `<button class="range-btn ${summaryRange===r?"sel":""}" onclick="summaryRange='${r}';render()">${r==="day"?"Día":r==="week"?"Semana":"Mes"}</button>`;
  });
  html += `</div><div style="font-size:11px;color:#5a7a5a;text-align:center;margin-bottom:14px">${fmtDate(s0)} → ${fmtDate(s1)}</div>`;

  // Big numbers
  html += `<div class="big-total" style="margin-bottom:16px">
    <div style="font-size:11px;color:#7fa87a;font-weight:600;text-transform:uppercase;letter-spacing:1px">Ingresos totales</div>
    <div class="mono orange" style="font-size:36px;font-weight:900;margin-top:4px">₡${tot.toLocaleString()}</div>
    <div style="display:flex;justify-content:center;gap:20px;margin-top:12px">
      <div><div style="font-size:10px;color:#5a7a5a">Cobrado</div><div class="mono green" style="font-size:16px;font-weight:800">₡${paid.toLocaleString()}</div></div>
      <div><div style="font-size:10px;color:#5a7a5a">Pendiente</div><div class="mono red" style="font-size:16px;font-weight:800">₡${pend.toLocaleString()}</div></div>
      <div><div style="font-size:10px;color:#5a7a5a">Reservas</div><div class="mono" style="font-size:16px;font-weight:800">${fl.length}</div></div>
    </div>
  </div>`;

  // By court
  html += `<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#a3d9a5;margin-bottom:12px">Por cancha</div>`;
  COURTS.forEach(c=>{
    const ct=fl.filter(b=>b.court===c.id);
    html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a2b1a">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="width:10px;height:10px;border-radius:3px;background:${c.color};display:inline-block"></span>
        <span style="font-weight:600;font-size:13px">${c.name}</span>
        <span style="color:#5a7a5a;font-size:11px">${ct.length} reservas</span>
      </div>
      <span class="mono" style="color:${c.color};font-weight:800;font-size:15px">₡${ct.reduce((a,b)=>a+Number(b.amount||0),0).toLocaleString()}</span>
    </div>`;
  });
  html += `</div>`;

  // By method
  html += `<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#a3d9a5;margin-bottom:12px">Por método de pago</div>`;
  let anyMethod=false;
  METHODS.forEach(m=>{
    const mt=fl.filter(b=>b.method===m);
    if(mt.length>0){ anyMethod=true;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2b1a">
        <span style="color:#a3d9a5;font-size:13px">${MICONS[m]} ${m} <span style="color:#5a7a5a;font-size:11px">(${mt.length})</span></span>
        <span class="mono" style="font-weight:800">₡${mt.reduce((a,b)=>a+Number(b.amount||0),0).toLocaleString()}</span>
      </div>`;
    }
  });
  if(!anyMethod) html += `<div style="color:#5a7a5a;font-size:12px;text-align:center;padding:12px">Sin datos</div>`;
  html += `</div>`;

  // Top clients
  const cMap={};
  fl.forEach(b=>{const n=b.client||"Sin nombre";if(!cMap[n])cMap[n]={c:0,t:0};cMap[n].c++;cMap[n].t+=Number(b.amount||0);});
  const topC=Object.entries(cMap).map(([n,d])=>({n,...d})).sort((a,b)=>b.c-a.c).slice(0,5);
  if(topC.length>0){
    html += `<div class="card" style="margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:#a3d9a5;margin-bottom:12px">🏆 Clientes frecuentes</div>`;
    topC.forEach((c,i)=>{
      const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":`${i+1}.`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a2b1a">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:${i===0?"#d4a012":"#5a7a5a"};font-weight:800;font-size:14px;width:20px">${medal}</span>
          <span style="font-weight:600;font-size:13px">${c.n}</span>
          <span style="color:#5a7a5a;font-size:11px">${c.c}x</span>
        </div>
        <span class="mono orange" style="font-weight:800">₡${c.t.toLocaleString()}</span>
      </div>`;
    });
    html += `</div>`;
  }

  // Peak hours
  const hMap={};
  fl.forEach(b=>{hMap[b.hour]=(hMap[b.hour]||0)+1;});
  const peaks=Object.entries(hMap).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(peaks.length>0){
    html += `<div class="card"><div style="font-size:13px;font-weight:700;color:#a3d9a5;margin-bottom:12px">🔥 Horas más populares</div>`;
    const mx=Number(peaks[0][1]);
    peaks.forEach(([hr,ct])=>{
      const hl=HOURS.find(x=>x.v===Number(hr))?.l;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:8px 0">
        <span style="color:#a3d9a5;font-weight:700;font-size:13px;width:65px">${hl}</span>
        <div class="bar-bg"><div class="bar-fill" style="width:${(ct/mx)*100}%"><span style="font-size:10px;font-weight:800;color:#fff">${ct}</span></div></div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}
